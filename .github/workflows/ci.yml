name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cert-chain
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cert-chain/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          CI: false

  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cert-chain-backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cert-chain-backend/package-lock.json
      - name: Install dependencies
        run: npm install

  contracts:
    name: Smart Contracts (Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cert-chain/contracts
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            cert-chain/contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('cert-chain/contracts/Cargo.lock') }}
      - name: Build Contract
        run: cargo build --target wasm32-unknown-unknown --release
